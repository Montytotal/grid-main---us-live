name: Build and deploy site

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          DATABASE_HOSTNAME=database
          DATABASE_USERNAME=grid
          DATABASE_PASSWORD=grid
          DATABASE_DATABASE=grid
          ERROR_REPORTING_THRESHOLD=0
          CLOUDFLARE_API_TOKEN=
          CLOUDFLARE_ZONE_ID=
          EIA_API_KEY=${{ secrets.EIA_API_KEY }}
          GOOGLE_ADSENSE_CLIENT=${{ secrets.GOOGLE_ADSENSE_CLIENT }}
          GOOGLE_ADSENSE_SLOT_TOP=${{ secrets.GOOGLE_ADSENSE_SLOT_TOP }}
          GOOGLE_ADSENSE_SLOT_MID=${{ secrets.GOOGLE_ADSENSE_SLOT_MID }}
          EOF

      - name: Build Docker services
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Generate static site
        run: docker compose exec -T php php /var/grid/update.php

      - name: Check generated files
        run: |
          test -f public/index.html
          test -f public/us/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload public folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
